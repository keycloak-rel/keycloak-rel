name: Announce Release

on:
  workflow_dispatch:
    inputs:
      server-version:
        description: Version of Keycloak Server released in keycloak/keycloak repository
        required: true
        default: skip
        type: string
      js-version:
        description: Version of Keycloak JS released in keycloak/keycloak-js repository
        required: true
        default: skip
        type: string
      client-version:
        description: Version of Keycloak Client Libs released in keycloak/keycloak-client repository
        required: true
        default: skip
        type: string

concurrency: rel-${{ github.ref }}

jobs:

  show-inputs:
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "Server version: ${{ inputs.server-version }}  " >> $GITHUB_STEP_SUMMARY
          echo "JS version: ${{ inputs.js-version }}  " >> $GITHUB_STEP_SUMMARY
          echo "Client Libs version: ${{ inputs.client-version }}  " >> $GITHUB_STEP_SUMMARY

  env:
    uses: ./.github/workflows/x-env.yml

  keycloak-quickstarts:
    name: Keycloak QuickStarts
    needs: [env]
    uses: ./.github/workflows/x-keycloak-quickstarts.yml
    with:
      gh-org: ${{ needs.env.outputs.gh-org }}
      server-version: ${{ github.event.inputs.server-version }}
      js-version: ${{ github.event.inputs.js-version }}
      client-version: ${{ github.event.inputs.client-version }}
      target-branch: main
    secrets:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}

  update-website:
    name: Update website
    uses: ./.github/workflows/x-keycloak-web.yml
    needs: [env]
    with:
      gh-org: ${{ needs.env.outputs.gh-org }}
      server-version: ${{ github.event.inputs.server-version }}
      js-version: ${{ github.event.inputs.js-version }}
      client-version: ${{ github.event.inputs.client-version }}
    secrets:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
